<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boner?</title>
</head>
<body>
    <p id="status">waiting...</p>
    <input type="range" value = "0" max="1" step = "0.0001" id="speed"> Speed <br>
    <input type="range" value = "0.5" max="1" step = "0.0001" id="dir"> Dir
</body>

<script>
    let socket = new WebSocket("ws://192.168.4.1:80/ws");
    let statusDisplay = document.getElementById("status");

    let speed = document.getElementById("speed");
    let dir = document.getElementById("dir");

    let data = new Uint8Array(2);

    socket.onopen = (e) => {
        console.log(e);
        statusDisplay.innerText = "Connected";
    };

    socket.onmessage = (e) => {
        console.log(e);
    };

    socket.onclose = (e) => {
        console.log(e);
        statusDisplay.innerText = "Closed";
    };

    socket.onerror = (e) => {
        console.log(e);
        statusDisplay.innerText = "Error";
    };

    speed.oninput = () => {
        handleInput();
    };

    dir.oninput = () => {
        handleInput();
    };

    function handleInput(){
        let s = parseFloat(speed.value);
        let d = parseFloat(dir.value);

        let L = s * Math.min(0.5, d) * 2;
        let R = s * Math.min(0.5, 1 - d) * 2;

        data[0] = Math.floor(L * 255);
        data[1] = Math.floor(R * 255);

        socket.send(data);
    }
</script>
