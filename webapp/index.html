<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boner?</title>
</head>
<body>
    <p id="status">loading script...</p>
    <input type="range" value = "0" max="1" step = "0.0001" id="speed"> Speed <br>
    <input type="range" value = "0.5" max="1" step = "0.0001" id="dir"> Dir <br>

    <input value = "1.0" id="boning-constant"> Boning constant <br>
    <input value = "1.0" id="right-coeff"> Right motor coeff <br>

    <textarea id="lqr-coeffs"></textarea>
    <button onclick="submit_lqr()">Update LQR</button>

    <div id="lqr-params"></div>
    <button onclick="send_lqr_params()">Update params and recalc</button><br>
    <button onclick="set_running(true)" class="bigbutton">ON</button>
    <button onclick="set_running(false)" class="bigbutton">OFF</button>

    <style>
        .bigbutton{
            width: 10em;
            height: 5em;
        }
    </style>
</body>

<script src="index.js"></script>
